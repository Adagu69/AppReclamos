<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="FRAGMENTS/head :: head"></head>
<body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
<div class="app-wrapper">
    <!-- Navbar -->
    <nav th:replace="FRAGMENTS/navbar :: navbar"></nav>

    <!-- Sidebar -->
    <aside th:replace="FRAGMENTS/sidebar :: sidebar"></aside>

    <!-- Main content -->
    <main class="app-main">
        <div class="app-content-header">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-sm-6">
                        <h3 class="mb-0">Reclamos</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="app-content">
            <div class="container-fluid">

                <!-- FILTROS -->
                <div class="card mb-4">
                    <div class="card-header">Filtros</div>
                    <div class="card-body row g-3 align-items-center">
                        <div class="col-md-2">
                            <label class="form-label">Estado</label>
                            <select class="form-select">
                                <option>Todos</option>
                                <option>No Proceso</option>
                                <option>Procesado</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Buscar por</label>
                            <select class="form-select">
                                <option>Todo</option>
                                <option>Código</option>
                                <option>Fecha</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Año</label>
                            <input type="number" class="form-control" value="2025" />
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Mes</label>
                            <select class="form-select">
                                <option>Enero</option>
                                <option selected>Abril</option>
                                <option>Mayo</option>
                                <!-- etc -->
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label d-block">&nbsp;</label>
                            <button class="btn btn-primary w-100">Buscar</button>
                        </div>
                        <div class="col-md-1 d-flex align-items-end">
                            <button class="btn btn-outline-success w-100">Nuevo</button>
                        </div>
                    </div>
                </div>

                <!-- TABLA DE RECLAMOS -->
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered table-striped">
                                <thead>
                                <tr>
                                    <th><input type="checkbox" /></th>
                                    <th>Fecha</th>
                                    <th>Medio</th>
                                    <th>Código</th>
                                    <th>Tipo Doc</th>
                                    <th>Nº Documento</th>
                                    <th>Razón Social</th>
                                    <th>Nombre</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="reclamo : ${reclamos}">
                                    <td><input type="checkbox" /></td>
                                    <td th:text="${reclamo.fecha}"></td>
                                    <td th:text="${reclamo.medio}"></td>
                                    <td th:text="${reclamo.codigo}"></td>
                                    <td th:text="${reclamo.tipoDoc}"></td>
                                    <td th:text="${reclamo.numeroDoc}"></td>
                                    <td th:text="${reclamo.razonSocial}"></td>
                                    <td th:text="${reclamo.nombreUsuario}"></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                        <p class="mt-3">Total Reclamos: <span th:text="${reclamos.size()}"></span></p>
                    </div>
                </div>

                <!-- BOTON TRAMA -->
                <div class="d-flex justify-content-end mt-3">
                    <button class="btn btn-secondary">Procesar Trama TXT</button>
                </div>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <div class="float-end d-none d-sm-inline">Sistema Reclamos</div>
        <strong>App &copy; 2025</strong>
    </footer>
</div>
</body>
</html>
